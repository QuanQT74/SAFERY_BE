name: CI/CD Pipeline - IoT Safety Backend

on:
  push:
    branches:
      - master
      - 'ci/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'        # ← sửa 17 → 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & run tests 
        run: mvn -B clean verify --file pom.xml

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'        # ← sửa 17 → 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            quandt74959/thinhdt:latest
            quandt74959/thinhdt:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref_name == 'master'   # ← chỉ deploy khi push lên master
    steps:
      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/Smart_safery/backend
            docker compose pull
            docker compose up -d
            docker image prune -f