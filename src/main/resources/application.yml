spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/iot_safety_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0
  forward-headers-strategy: native

app:
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:firebase-service-account.properties}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 900000
  refresh-token-expiration: 2592000000

device:
  offline:
    timeout:
      minutes: 5

?twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your-twilio-account-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your-twilio-auth-token}
  from-number: ${TWILIO_FROM_NUMBER:your-twilio-phone-number}

?otp:
  expiry-minutes: 5
  length: 6